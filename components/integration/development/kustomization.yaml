apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/konflux-ci/integration-service/config/default?ref=334d22202f00ef778d0faca9cbe8e48ee80b2336
  - https://github.com/konflux-ci/integration-service/config/snapshotgc?ref=334d22202f00ef778d0faca9cbe8e48ee80b2336
images:
  - name: quay.io/redhat-appstudio/integration-service
    newName: quay.io/jsztuka/integration-service
    newTag: v825-1
configMapGenerator:
  - name: integration-config
    literals:
      - CONSOLE_NAME="Konflux Dev version"
      - CONSOLE_URL=""
      - CONSOLE_URL_TASKLOG=""
  - name: pipelinerun-options
    literals:
      - PIPELINE_TIMEOUT="6h"
      - TASKS_TIMEOUT="4h"
      - FINALLY_TIMEOUT="2h"
namespace: integration-service
patches:
  - path: manager_resources_patch.yaml
  - path: snapshotgc_inputs_patch.yaml
    target:
      kind: CronJob
      name: snapshot-garbage-collector
components:
  - ../rh-certs
